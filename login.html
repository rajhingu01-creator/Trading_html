<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TutoLab - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #3b5fa0;
      --primary-dark: #2d4a82;
      --accent: #6c63ff;
      --text: #222;
      --muted: #888;
      --border: #d8dce4;
      --bg: #f5f6fa;
      --white: #fff;
      --orange: #e07a30;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      color: var(--text);
    }

    /* NAV */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 48px;
      background: #000;
      border-bottom: 1px solid #333;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }

    .logo-sub {
      font-size: 0.55rem;
      color: #ccc;
      letter-spacing: 0.02em;
    }

    .nav-signup {
      font-size: 0.875rem;
      color: #fff;
    }

    .nav-signup a {
      color: #fff;
      font-weight: 600;
      text-decoration: none;
    }

    .nav-signup a:hover { text-decoration: underline; }

    /* MAIN */
    main {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 60px 16px 40px;
    }

    .card {
      background: var(--white);
      border-radius: 12px;
      padding: 48px 48px 40px;
      width: 100%;
      max-width: 560px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.06);
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
      color: var(--text);
    }

    .subtitle {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    /* INPUTS */
    .field {
      position: relative;
      margin-bottom: 16px;
    }

    .field input {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--white);
      outline: none;
      transition: border-color 0.2s;
    }

    .field input::placeholder { color: #b0b5c0; }
    .field input:focus { border-color: var(--accent); }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 1rem;
      padding: 0;
      line-height: 1;
    }

    /* CAPTCHA */
    .captcha-box {
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      background: #fafafa;
    }

    .captcha-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .captcha-checkbox {
      width: 18px;
      height: 18px;
      border: 2px solid #aaa;
      border-radius: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .captcha-label {
      font-size: 0.85rem;
      color: var(--text);
    }

    .captcha-right {
      text-align: right;
    }

    .recaptcha-logo {
      width: 32px;
      height: 32px;
    }

    .captcha-brand {
      font-size: 0.6rem;
      color: #aaa;
      display: block;
      margin-top: 2px;
    }

    .captcha-links {
      font-size: 0.55rem;
      color: #bbb;
    }

    /* REMEMBER ME */
    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: var(--text);
      cursor: pointer;
    }

    .remember input[type="checkbox"] {
      width: 14px;
      height: 14px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* LOGIN BTN */
    .btn-login {
      width: 100%;
      padding: 15px;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.02em;
    }

    .btn-login:hover { background: var(--primary-dark); }
    .btn-login:active { transform: scale(0.99); }

    /* OR */
    .divider {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      margin: 20px 0;
      position: relative;
    }

    /* SOCIAL BUTTONS */
    .btn-social {
      width: 100%;
      padding: 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: var(--white);
      font-family: 'Poppins', sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      transition: background 0.15s, border-color 0.15s;
    }

    .btn-social:hover { background: #f5f6fa; border-color: #bbb; }
    .btn-social:last-of-type { margin-bottom: 0; }

    .btn-social svg { flex-shrink: 0; }

    /* FORGOT */
    .forgot {
      text-align: right;
      margin-top: 20px;
    }

    .forgot a {
      color: var(--orange);
      font-size: 0.875rem;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <nav>
    <a href="#" class="logo">
      <img src="./Images/shree_logo.png" alt="Shreeji Techno" style="height: 50px; object-fit: contain;">
    </a>
    <div class="nav-signup">Don't have account? <a href="./register.html">Sign Up</a></div>

          <span class="captcha-label">I'm not a robot</span>
        </div> -->

          <!-- reCAPTCHA icon -->
          <!-- <svg class="recaptcha-logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
            <circle cx="32" cy="32" r="30" fill="#4A90D9"/>
            <path d="M32 14 L50 44 H14 Z" fill="white" opacity="0.9"/>
            <circle cx="32" cy="32" r="8" fill="#4A90D9"/>
          </svg>
          <span class="captcha-brand">reCAPTCHA</span>
          <span class="captcha-links">Privacy · Terms</span>
        </div> -->
      <!-- </div> -->

      <label class="remember">
        <input type="checkbox" id="remember"/>
        Remember Me
      </label>

      <button class="btn-login">Login</button>
      <div class="forgot"><a href="#">Forgot your password?</a></div>

      <div class="divider">OR</div>

      <!-- Google -->
      <button class="btn-social">
        <svg width="18" height="18" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.16 2.85l6.09-6.09C34.46 3.1 29.5 1 24 1 14.82 1 7.07 6.48 3.58 14.22l7.07 5.5C12.35 13.52 17.7 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.52 24.5c0-1.64-.15-3.22-.42-4.74H24v8.97h12.67c-.55 2.95-2.2 5.45-4.69 7.12l7.19 5.59C43.1 37.68 46.52 31.6 46.52 24.5z"/>
          <path fill="#FBBC05" d="M10.65 28.28A14.57 14.57 0 0 1 9.5 24c0-1.5.26-2.95.72-4.28l-7.07-5.5A23.93 23.93 0 0 0 0 24c0 3.87.93 7.53 2.58 10.78l8.07-6.5z"/>
          <path fill="#34A853" d="M24 47c5.52 0 10.15-1.83 13.53-4.97l-7.19-5.59c-1.83 1.23-4.17 1.96-6.34 1.96-6.3 0-11.65-4.02-13.35-9.62l-8.07 6.5C7.07 41.52 14.82 47 24 47z"/>

      <!-- Facebook -->
      <button class="btn-social">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2">
          <path d="M24 12.073C24 5.405 18.627 0 12 0S0 5.405 0 12.073C0 18.1 4.388 23.094 10.125 24v-8.437H7.078v-3.49h3.047V9.41c0-3.025 1.792-4.697 4.533-4.697 1.312 0 2.686.235 2.686.235v2.97h-1.513c-1.491 0-1.956.93-1.956 1.886v2.27h3.328l-.532 3.49h-2.796V24C19.612 23.094 24 18.1 24 12.073z"/>
        </svg>

      <!-- LinkedIn -->

        <svg width="18" height="18" viewBox="0 0 24 24" fill="#0A66C2">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

        Login with Linkedin

      <!-- <div class="forgot"><a href="#">Forgot your password?</a></div> -->
    </div>
  </main>

  <script>
    function togglePassword() {
      const pw = document.getElementById('password');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    function toggleCaptcha() {
      const box = document.getElementById('captcha');
      if (box.innerHTML.trim() === '') {
        box.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12"><polyline points="1,6 4.5,10 11,2" fill="none" stroke="#4caf50" stroke-width="2" stroke-linecap="round"/></svg>`;
        box.style.borderColor = '#4caf50';
      } else {
        box.innerHTML = '';
        box.style.borderColor = '#aaa';
      }
    }
  </script>
</body>
</html>
